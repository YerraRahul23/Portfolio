<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Yerra Rahul</title>
    <link rel="icon" type="image/x-icon" href="../public/media/profile.jpeg">
    <link rel="stylesheet" href="../style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Great+Vibes&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: #e7e4db;
            color: #1e2f2f;
        }

        .header {
            padding: 20px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #e7e4db;
        }

        .logo {
            font-family: "Great Vibes", cursive;
            font-size: 34px;
        }

        .pill-nav {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 12px 30px;
            border-radius: 50px;
            display: flex;
            gap: 35px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .pill-nav a {
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            color: #1e2f2f;
        }

        .pill-nav a:hover {
            color: #7b61ff;
        }

        .menu-toggle {
            display: none;
            font-size: 26px;
            cursor: pointer;
        }

        .contact-section {
            max-width: 1200px;
            margin: 100px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }

        .contact-left h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .contact-left p {
            color: #555;
            margin-bottom: 40px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .info-item i {
            color: #7b61ff;
        }

        .contact-form {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .contact-form h2 {
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        .submit-btn {
            background: #7b61ff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #5a46d8;
        }

        @media(max-width:900px) {
            .contact-section {
                grid-template-columns: 1fr;
            }

            .menu-toggle {
                display: block;
            }

            .pill-nav {
                display: none;
                flex-direction: column;
                gap: 20px;
                width: 90%;
                padding: 25px;
                border-radius: 20px;
            }

            .pill-nav.active {
                display: flex;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="logo">Yerra Rahul</div>
        <div class="menu-toggle">☰</div>

        <nav class="pill-nav">
            <a href="../index.html#contact">BACK</a>
            <a href="../index.html" class="active">HOME</a>
            <a href="Contact.html">CONTACT</a>
        </nav>
    </header>

    <section class="contact-section">

        <div class="contact-left">
            <h1>Let's Work Together</h1>
            <p>Feel free to reach out for collaborations or projects 👋</p>
        </div>

        <form id="contact-form" class="contact-form">
            <h2>Send Message</h2>

            <div class="form-group">
                <input type="text" placeholder="Your Name" name="name" required>
            </div>

            <div class="form-group">
                <input type="email" placeholder="Your Email" name="email" required>
            </div>

            <div class="form-group">
                <textarea name="message" placeholder="Your Message" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
            <p id="form-status" style="margin-top:15px;"></p>
        </form>

    </section>
    <script>
        const form = document.getElementById("contact-form");
        const status = document.getElementById("form-status");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            status.innerHTML = "Sending...";
            status.style.color = "#555";

            try {
                const response = await fetch(
                    "https://yhneaxuacwlaamfibbth.supabase.co/functions/v1/send-email",
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            name: form.name.value,
                            email: form.email.value,
                            message: form.message.value
                        })
                    }
                );

                const data = await response.json();

                if (response.ok) {
                    status.innerHTML = "✅ Message sent successfully!";
                    status.style.color = "green";
                    form.reset();
                } else {
                    status.innerHTML = "❌ Failed to send message.";
                    status.style.color = "red";
                    console.error(data);
                }

            } catch (error) {
                status.innerHTML = "❌ Network error.";
                status.style.color = "red";
                console.error(error);
            }
        });

        const toggle = document.querySelector(".menu-toggle");
        const nav = document.querySelector(".pill-nav");

        toggle.addEventListener("click", () => {
            nav.classList.toggle("active");
            toggle.textContent = nav.classList.contains("active") ? "✕" : "☰";
        });
    </script>
</body>

</html>
